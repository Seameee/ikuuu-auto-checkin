name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    - cron: "25 0 * * *"

jobs:

  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    environment: IKUUU
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWD: ${{ secrets.PASSWD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js latest
        uses: actions/setup-node@v4
        with:
          node-version: latest
          
      - name: йҡҸжңәе»¶иҝҹжү§иЎҢ
        id: delay_step
        run: |
          # з”ҹжҲҗ 0-300 з§’пјҲ0-5еҲҶй’ҹпјүзҡ„йҡҸжңәе»¶иҝҹ
          DELAY=$((RANDOM % 300))
          echo "вҸ° йҡҸжңәе»¶иҝҹ $DELAY з§’ ($(($DELAY / 60)) еҲҶй’ҹ $(($DELAY % 60)) з§’)"
          echo "delay_seconds=$DELAY" >> $GITHUB_OUTPUT
          echo "delay_type=йҡҸжңәе»¶иҝҹ" >> $GITHUB_OUTPUT
          sleep $DELAY
          
      - name: Checkin
        shell: bash
        run: |
          node main.js
